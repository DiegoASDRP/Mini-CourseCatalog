<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Self-enrollment links for ASDRP Canvas courses." />
    <title>Canvas course enrollment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,550;0,9..144,650&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg0: #060818;
        --bg1: #0a0d1f;
        --bg2: #0f1228;
        --card: rgba(255, 255, 255, 0.045);
        --card-inner: rgba(255, 255, 255, 0.04);
        --card-border: rgba(167, 139, 250, 0.14);
        --text: #f1f5f9;
        --muted: #a3b4d4;
        --accent: #a78bfa;
        --accent-2: #60a5fa;
        --accent-deep: #6366f1;
        --glow: rgba(139, 92, 246, 0.14);
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.35), 0 20px 50px rgba(0, 0, 0, 0.52);
        --radius: 20px;
        --font: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-display: "Fraunces", Georgia, "Times New Roman", serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      @keyframes orb-float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(2%, -3%) scale(1.03);
        }
        66% {
          transform: translate(-2%, 2%) scale(0.98);
        }
      }

      @keyframes orb-drift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(-4%, 3%);
        }
      }

      @keyframes title-shimmer {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      /* —— Silk family: shared hero (title letter-spacing + blur reveals) —— */
      @keyframes intro-silk-eyebrow {
        from {
          opacity: 0;
          transform: translateY(20px);
          filter: blur(8px);
        }
        to {
          opacity: 1;
          transform: none;
          filter: none;
        }
      }

      @keyframes intro-silk-title {
        from {
          opacity: 0;
          transform: translateY(26px);
          letter-spacing: 0.055em;
        }
        to {
          opacity: 1;
          transform: none;
          letter-spacing: -0.03em;
        }
      }

      @keyframes intro-silk-sub {
        from {
          opacity: 0;
          transform: translateY(18px);
          filter: blur(6px);
        }
        to {
          opacity: 1;
          transform: none;
          filter: none;
        }
      }

      @keyframes intro-silk-foot {
        from {
          opacity: 0;
          transform: translateY(14px);
          filter: blur(3px);
        }
        to {
          opacity: 1;
          transform: none;
          filter: none;
        }
      }

      /* Course cards: ripple scale-in */
      @keyframes card-silk-ripple {
        from {
          opacity: 0;
          transform: scale(0.94);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes card-silk-ripple-mobile {
        from {
          opacity: 0;
          transform: scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes subtitle-caret {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      @keyframes intro-alert {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes sheen {
        to {
          transform: translateX(200%);
        }
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font);
        color: var(--text);
        background-color: var(--bg0);
        background-image: radial-gradient(ellipse 130% 75% at 50% -28%, var(--glow), transparent 50%),
          radial-gradient(820px 480px at 100% -5%, rgba(59, 130, 246, 0.12), transparent),
          radial-gradient(720px 460px at 0% 100%, rgba(168, 85, 247, 0.1), transparent),
          radial-gradient(600px 380px at 80% 85%, rgba(34, 211, 238, 0.06), transparent),
          linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 44%, var(--bg2) 100%);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.28;
        background-image: radial-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(ellipse 88% 72% at 50% 42%, black 18%, transparent 72%);
      }

      .bg-effects {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(88px);
        opacity: 0.44;
        will-change: transform;
      }

      .bg-orb-1 {
        width: min(52vw, 440px);
        height: min(52vw, 440px);
        top: -14%;
        left: 50%;
        transform: translateX(-50%);
        background: radial-gradient(circle, rgba(167, 139, 250, 0.38) 0%, rgba(99, 102, 241, 0.12) 42%, transparent 70%);
        animation: orb-float 20s ease-in-out infinite;
      }

      .bg-orb-2 {
        width: min(42vw, 360px);
        height: min(42vw, 360px);
        top: 42%;
        right: -10%;
        background: radial-gradient(circle, rgba(56, 189, 248, 0.28) 0%, rgba(59, 130, 246, 0.1) 50%, transparent 72%);
        animation: orb-drift 24s ease-in-out infinite;
      }

      .bg-orb-3 {
        width: min(48vw, 400px);
        height: min(48vw, 400px);
        bottom: -18%;
        left: -12%;
        background: radial-gradient(circle, rgba(192, 132, 252, 0.26) 0%, rgba(236, 72, 153, 0.08) 48%, transparent 68%);
        animation: orb-float 22s ease-in-out infinite reverse;
      }

      .wrap {
        position: relative;
        z-index: 1;
        max-width: 1040px;
        margin: 0 auto;
        padding: clamp(1.75rem, 5vw, 3.25rem) clamp(1rem, 3vw, 1.75rem) 4rem;
      }

      header {
        text-align: center;
        margin-bottom: clamp(2.25rem, 6vw, 3.5rem);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.42rem;
        margin-bottom: 0.85rem;
        padding: 0.38rem 0.9rem;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #ddd6fe;
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.22), rgba(59, 130, 246, 0.14));
        border: 1px solid rgba(167, 139, 250, 0.45);
        border-radius: 999px;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      a.eyebrow {
        text-decoration: none;
        transition: color 0.2s ease, border-color 0.2s ease, filter 0.2s ease, transform 0.2s ease;
      }

      a.eyebrow:hover {
        color: #f8fafc;
        border-color: rgba(125, 211, 252, 0.6);
        filter: brightness(1.08);
        transform: translateY(-1px);
      }

      a.eyebrow:focus-visible {
        outline: 2px solid rgba(167, 139, 250, 0.9);
        outline-offset: 4px;
      }

      .eyebrow svg {
        width: 0.92rem;
        height: 0.92rem;
        flex-shrink: 0;
        letter-spacing: 0;
      }

      header h1 {
        margin: 0 0 0.65rem;
        font-family: var(--font-display);
        font-size: clamp(1.85rem, 4.5vw, 2.65rem);
        font-weight: 550;
        font-optical-sizing: auto;
        letter-spacing: -0.03em;
        line-height: 1.15;
        /* Wide hue range + large background so title-shimmer clearly shifts color */
        background: linear-gradient(
          115deg,
          #ffffff 0%,
          #f8fafc 6%,
          #e0e7ff 18%,
          #c4b5fd 30%,
          #a5b4fc 40%,
          #7dd3fc 50%,
          #38bdf8 58%,
          #bae6fd 68%,
          #e2e8f0 82%,
          #cbd5e1 92%,
          #94a3b8 100%
        );
        background-size: 320% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: intro-silk-title 1.42s cubic-bezier(0.22, 1, 0.36, 1) 0s backwards,
          title-shimmer 13s ease-in-out 1.28s infinite;
      }

      #site-eyebrow {
        animation: intro-silk-eyebrow 1.25s cubic-bezier(0.22, 1, 0.36, 1) 0s backwards;
      }

      #site-subtitle {
        animation: intro-silk-sub 1.35s cubic-bezier(0.22, 1, 0.36, 1) 0.28s backwards;
      }

      @media (min-width: 640px) {
        header h1 {
          background-size: 340% auto;
        }
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .site-subtitle {
        margin: 0 auto;
        max-width: 36rem;
        color: var(--muted);
        font-size: 1.0625rem;
        font-weight: 400;
        min-height: 1.55em;
        position: relative;
      }

      .subtitle-prefix {
        white-space: pre-wrap;
      }

      .subtitle-typed {
        font-weight: 500;
        color: #c7d7f0;
      }

      .subtitle-typed--cursor::after {
        content: "";
        display: inline-block;
        width: 2px;
        height: 1.05em;
        margin-left: 2px;
        background: linear-gradient(180deg, #a78bfa, #60a5fa);
        vertical-align: -0.12em;
        border-radius: 1px;
        animation: subtitle-caret 1.1s step-end infinite;
      }

      .course-card-title-block {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        align-content: start;
      }

      .course-meta {
        margin: 0;
        font-size: 0.75rem;
        line-height: 1.35;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #94a3b8;
        text-transform: none;
      }

      .course-by {
        margin: 0;
        padding: 0;
        font-size: 0.8125rem;
        line-height: 1.4;
        text-align: left;
      }

      .course-by-label {
        color: var(--muted);
        font-weight: 400;
      }

      .course-by-name,
      a.course-by-name {
        color: #a5f3fc;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: 0.01em;
      }

      a.course-by-name {
        border-bottom: 1px solid rgba(165, 243, 252, 0.35);
        transition: color 0.2s ease, border-color 0.2s ease;
      }

      a.course-by-name:hover {
        color: #ecfeff;
        border-bottom-color: rgba(236, 254, 255, 0.55);
      }

      a.course-by-name:focus-visible {
        outline: 2px solid rgba(167, 139, 250, 0.9);
        outline-offset: 3px;
        border-radius: 3px;
      }

      .catalog-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem;
        margin: 0 auto 1.35rem;
        animation: intro-silk-sub 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.42s backwards;
      }

      .catalog-control {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.32rem;
        border-radius: 14px;
        border: 1px solid rgba(167, 139, 250, 0.2);
        background: rgba(255, 255, 255, 0.045);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .catalog-control-label {
        align-self: stretch;
        display: inline-flex;
        align-items: center;
        padding: 0 0.7rem;
        border-radius: 10px;
        color: #dbeafe;
        background: rgba(15, 23, 42, 0.58);
        border: 1px solid rgba(148, 163, 184, 0.2);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: default;
        user-select: none;
      }

      .catalog-control-button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 0.46rem 0.68rem;
        color: #c7d7f0;
        background: transparent;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        transition: color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      }

      .catalog-control-button:hover {
        color: #f8fafc;
        background: rgba(255, 255, 255, 0.075);
      }

      .catalog-control-button[aria-pressed="true"] {
        color: #ffffff;
        background: linear-gradient(155deg, rgba(139, 92, 246, 0.8), rgba(59, 130, 246, 0.72));
        box-shadow: 0 6px 18px rgba(59, 130, 246, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      .catalog-control-button:focus-visible {
        outline: 2px solid rgba(167, 139, 250, 0.9);
        outline-offset: 2px;
      }

      .catalog {
        display: block;
      }

      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }

      @media (min-width: 540px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (min-width: 900px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 1.35rem;
        }
      }

      .course-group + .course-group {
        margin-top: 1.65rem;
      }

      .course-group-title {
        margin: 0 0 0.75rem;
        color: #dbeafe;
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .course-card {
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 0;
        overflow: hidden;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(18px) saturate(1.2);
        -webkit-backdrop-filter: blur(18px) saturate(1.2);
        transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.28s ease,
          box-shadow 0.28s ease;
      }

      #course-grid .course-card {
        animation: card-silk-ripple 1.05s cubic-bezier(0.25, 0.46, 0.45, 0.94) backwards;
        animation-delay: calc(0.48s + 0.07s * var(--i, 0));
      }

      @media (max-width: 539px) {
        #course-grid .course-card {
          animation-name: card-silk-ripple-mobile;
          animation-duration: 0.78s;
          animation-delay: calc(0.38s + 0.045s * var(--i, 0));
        }
      }

      .course-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 2px;
        background: linear-gradient(90deg, #c084fc, #818cf8, #38bdf8, #22d3ee);
        opacity: 0.75;
        transition: opacity 0.28s ease;
      }

      .course-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          transparent 0%,
          transparent 42%,
          rgba(255, 255, 255, 0.06) 48%,
          rgba(255, 255, 255, 0.1) 50%,
          rgba(255, 255, 255, 0.06) 52%,
          transparent 58%
        );
        transform: translateX(-120%);
        transition: opacity 0.3s ease;
        opacity: 0;
        pointer-events: none;
      }

      .course-card:hover {
        transform: translateY(-4px) scale(1.008);
        border-color: rgba(167, 139, 250, 0.35);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 28px 56px rgba(0, 0, 0, 0.32),
          0 0 0 1px rgba(99, 102, 241, 0.25), 0 0 48px rgba(139, 92, 246, 0.12),
          0 0 36px rgba(34, 211, 238, 0.08);
      }

      @media (hover: none) {
        .course-card:hover {
          transform: translateY(-2px) scale(1.004);
        }

        .course-card:hover .course-icon {
          transform: scale(1.03) rotate(-1deg);
        }
      }

      .course-card:hover::before {
        opacity: 1;
      }

      .course-card:hover::after {
        opacity: 1;
        animation: sheen 0.85s ease forwards;
      }

      .course-card:focus-within {
        outline: 2px solid rgba(167, 139, 250, 0.85);
        outline-offset: 4px;
      }

      .course-card:focus-within::before {
        opacity: 1;
      }

      .course-card-inner {
        display: flex;
        flex-direction: column;
        flex: 1;
        padding: 1.35rem 1.4rem 1.3rem;
        background: linear-gradient(165deg, rgba(139, 92, 246, 0.06), var(--card-inner) 35%, transparent 65%);
      }

      .course-card-head {
        display: flex;
        align-items: flex-start;
        gap: 0.85rem;
        margin-bottom: 1rem;
        flex: 1;
      }

      .course-icon {
        flex-shrink: 0;
        width: 2.5rem;
        height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: linear-gradient(145deg, rgba(167, 139, 250, 0.28), rgba(59, 130, 246, 0.15));
        border: 1px solid rgba(192, 132, 252, 0.4);
        color: #e9d5ff;
        box-shadow: 0 4px 16px rgba(139, 92, 246, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s ease, border-color 0.28s ease,
          color 0.28s ease;
      }

      .course-card:hover .course-icon {
        transform: scale(1.05) rotate(-2deg);
        border-color: rgba(34, 211, 238, 0.55);
        color: #f0f9ff;
        box-shadow: 0 6px 22px rgba(59, 130, 246, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }

      .course-icon svg {
        width: 1.2rem;
        height: 1.2rem;
      }

      .course-icon img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        border-radius: 11px;
      }

      .course-title {
        margin: 0;
        min-height: calc(0.15rem + 2 * 1.35 * 1.07rem);
        padding-top: 0.15rem;
        font-size: 1.07rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.35;
        color: var(--text);
      }

      .course-card-foot {
        padding: 0 1.4rem 1.35rem;
        margin-top: auto;
      }

      .btn-join {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 0.74rem 1.1rem;
        border-radius: 12px;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        text-decoration: none;
        color: #fafafa;
        background: linear-gradient(155deg, #8b5cf6 0%, #6366f1 28%, #3b82f6 58%, #2563eb 100%);
        border: 1px solid rgba(216, 180, 254, 0.35);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.22) inset, 0 4px 16px rgba(99, 102, 241, 0.45),
          0 2px 8px rgba(0, 0, 0, 0.25);
        cursor: pointer;
        transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1), filter 0.22s ease, box-shadow 0.22s ease;
      }

      .btn-join::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 0%,
          rgba(255, 255, 255, 0.12) 45%,
          rgba(255, 255, 255, 0.22) 50%,
          rgba(255, 255, 255, 0.12) 55%,
          transparent 100%
        );
        transform: translateX(-100%);
        transition: transform 0s;
      }

      .btn-join:hover {
        filter: brightness(1.08) saturate(1.08);
        transform: translateY(-2px);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.28) inset, 0 8px 28px rgba(139, 92, 246, 0.4),
          0 6px 24px rgba(59, 130, 246, 0.35), 0 6px 20px rgba(0, 0, 0, 0.3);
      }

      .btn-join:hover::after {
        transform: translateX(100%);
        transition: transform 0.55s ease;
      }

      .btn-join:active {
        transform: translateY(1px);
        filter: brightness(0.96);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08) inset, 0 1px 4px rgba(0, 0, 0, 0.3);
      }

      .btn-join svg {
        width: 1rem;
        height: 1rem;
        flex-shrink: 0;
        opacity: 0.9;
      }

      .alert {
        max-width: 40rem;
        margin: 2rem auto 0;
        padding: 1rem 1.25rem;
        border-radius: var(--radius);
        background: rgba(251, 191, 36, 0.16);
        border: 1px solid rgba(252, 211, 77, 0.5);
        color: #fef08a;
        font-size: 0.95rem;
        text-align: center;
      }

      .site-footer {
        margin-top: 3.25rem;
        padding-top: 1.75rem;
        text-align: center;
        font-size: 0.8125rem;
        color: var(--muted);
        max-width: 36rem;
        margin-left: auto;
        margin-right: auto;
        position: relative;
        line-height: 1.55;
        animation: intro-silk-foot 1.15s cubic-bezier(0.22, 1, 0.36, 1) 0.85s backwards;
      }

      .site-footer-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      @media (min-width: 520px) {
        .site-footer-inner--split {
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: center;
          gap: 0.35rem 0.75rem;
        }
      }

      .site-footer-dot {
        display: none;
        color: rgba(163, 180, 212, 0.45);
        font-weight: 400;
        user-select: none;
      }

      @media (min-width: 520px) {
        .site-footer-inner--split .site-footer-dot {
          display: inline;
        }
      }

      .site-footer-copy {
        margin: 0;
        color: rgba(199, 215, 240, 0.88);
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .site-footer-contact {
        margin: 0;
        color: var(--muted);
        font-weight: 400;
      }

      .site-footer-mail {
        margin-left: 0.25rem;
        color: #a5f3fc;
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid rgba(165, 243, 252, 0.3);
        transition: color 0.2s ease, border-color 0.2s ease;
      }

      .site-footer-mail:hover {
        color: #ecfeff;
        border-bottom-color: rgba(236, 254, 255, 0.5);
      }

      .site-footer-mail:focus-visible {
        outline: 2px solid rgba(167, 139, 250, 0.9);
        outline-offset: 3px;
        border-radius: 3px;
      }

      @media (max-width: 519px) {
        .site-footer-inner--split .site-footer-contact {
          text-align: center;
        }

        .site-footer-inner--split .site-footer-mail {
          margin-left: 0;
          display: inline;
        }
      }

      #config-error:not([hidden]) {
        animation: intro-alert 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.45s backwards;
      }

      .site-footer::before {
        content: "";
        display: block;
        height: 1px;
        margin: 0 auto 1.5rem;
        max-width: 12rem;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(192, 132, 252, 0.55),
          rgba(56, 189, 248, 0.5),
          rgba(99, 102, 241, 0.45),
          transparent
        );
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        .course-card,
        .btn-join {
          transition: none;
        }
        .bg-orb {
          animation: none !important;
        }
        #site-eyebrow,
        #site-subtitle,
        .catalog-controls,
        .site-footer,
        #config-error:not([hidden]) {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
          filter: none !important;
        }
        #course-grid .course-card {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        header h1 {
          animation: title-shimmer 13s ease-in-out infinite !important;
        }
        .course-card:hover {
          transform: none;
        }
        .course-card:hover::after {
          animation: none !important;
          opacity: 0 !important;
        }
        .course-card:hover .course-icon {
          transform: none;
        }
        .btn-join:hover {
          transform: none;
        }
        .btn-join::after {
          display: none !important;
        }
        .subtitle-typed--cursor::after {
          animation: none !important;
          opacity: 0.75;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-effects" aria-hidden="true">
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
      <div class="bg-orb bg-orb-3"></div>
    </div>
    <div class="wrap">
      <header>
        <a
          class="eyebrow"
          id="site-eyebrow"
          href="https://sites.google.com/asdrp.org/student-training/mini-courses"
          target="_blank"
          rel="noopener noreferrer"
          >Learn more about Mini-Courses
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 17L17 7" />
            <path d="M7 7h10v10" />
          </svg>
        </a>
        <h1 id="site-title">Canvas course enrollment</h1>
        <p id="site-subtitle" class="site-subtitle">
          <span id="subtitle-a11y" class="sr-only" aria-live="polite" aria-atomic="true"></span>
          <span id="subtitle-prefix"></span>
          <span id="subtitle-typed" class="subtitle-typed subtitle-typed--cursor" aria-hidden="true"></span>
        </p>
      </header>
      <section class="catalog-controls" id="catalog-controls" aria-label="Course display controls">
        <div class="catalog-control" role="group" aria-label="Group courses">
          <span class="catalog-control-label" aria-hidden="true">Group By</span>
          <button class="catalog-control-button" type="button" data-group="block" aria-pressed="true">Block</button>
          <button class="catalog-control-button" type="button" data-group="format" aria-pressed="false">In-Person/Online</button>
        </div>
      </section>
      <main id="course-grid" class="catalog" aria-live="polite"></main>
      <div id="config-error" class="alert" hidden></div>
      <footer class="site-footer" id="site-footer"></footer>
    </div>
    <script src="site-config.js"></script>
    <script>
      (function () {
        "use strict";

        var subtitleAnimTimer = null;
        var subtitleAnimToken = 0;
        var catalogState = {
          group: "block",
        };

        function clearSubtitleAnimation() {
          if (subtitleAnimTimer) {
            clearTimeout(subtitleAnimTimer);
            subtitleAnimTimer = null;
          }
          subtitleAnimToken += 1;
        }

        function scheduleSubtitleStep(runId, delayMs, fn) {
          subtitleAnimTimer = setTimeout(function () {
            subtitleAnimTimer = null;
            if (runId !== subtitleAnimToken) {
              return;
            }
            fn();
          }, delayMs);
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function escapeAttr(s) {
          return escapeHtml(s).replace(/'/g, "&#39;");
        }

        function safeExternalUrl(url) {
          var t = typeof url === "string" ? url.trim() : "";
          if (/^https?:\/\//i.test(t) || /^mailto:/i.test(t)) {
            return t;
          }
          return "";
        }

        var DEFAULT_FOOTER_NOTE =
          "Opens Canvas in a new tab. Sign in with your school account if prompted.";

        function isReasonableFooterEmail(s) {
          var t = typeof s === "string" ? s.trim() : "";
          if (t.length < 3 || t.length > 120) {
            return false;
          }
          if (/[\s<>"'`]/.test(t)) {
            return false;
          }
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t);
        }

        function applyFooter(cfg) {
          var el = document.getElementById("site-footer");
          if (!el) {
            return;
          }
          var emailRaw =
            cfg && cfg.footerContactEmail != null ? String(cfg.footerContactEmail).trim() : "";
          if (emailRaw && isReasonableFooterEmail(emailRaw)) {
            var copy =
              cfg.footerCopyright != null && String(cfg.footerCopyright).trim()
                ? String(cfg.footerCopyright).trim()
                : "© " + new Date().getFullYear() + " ASDRP";
            var hint =
              cfg.footerSupportText != null && String(cfg.footerSupportText).trim()
                ? String(cfg.footerSupportText).trim()
                : "Something wrong?";
            var mailHref = "mailto:" + emailRaw;
            el.innerHTML =
              '<div class="site-footer-inner site-footer-inner--split">' +
              '<p class="site-footer-copy">' +
              escapeHtml(copy) +
              '</p><span class="site-footer-dot" aria-hidden="true">·</span><p class="site-footer-contact">' +
              escapeHtml(hint) +
              ' <a class="site-footer-mail" href="' +
              escapeAttr(mailHref) +
              '">' +
              escapeHtml(emailRaw) +
              "</a></p></div>";
            return;
          }
          el.innerHTML = "";
          if (cfg && typeof cfg.footerNote === "string" && cfg.footerNote.trim()) {
            el.textContent = cfg.footerNote.trim();
          } else {
            el.textContent = DEFAULT_FOOTER_NOTE;
          }
        }

        function normalizeCourseAdvisors(course) {
          if (!course) {
            return [];
          }

          var raw = Array.isArray(course.advisors) ? course.advisors : [];
          var advisors = [];
          for (var i = 0; i < raw.length; i++) {
            var item = raw[i];
            var name = "";
            var url = "";
            if (typeof item === "string") {
              name = item.trim();
            } else if (item && typeof item === "object") {
              name = item.name != null ? String(item.name).trim() : "";
              url = item.url != null ? String(item.url).trim() : "";
            }
            if (name) {
              advisors.push({ name: name, url: url });
            }
          }

          if (advisors.length > 0) {
            return advisors;
          }

          var name = course.advisorName != null ? String(course.advisorName).trim() : "";
          if (!name) {
            return [];
          }
          var urlRaw = course.advisorUrl != null ? String(course.advisorUrl).trim() : "";
          return [{ name: name, url: urlRaw }];
        }

        function advisorNameMarkup(advisor) {
          var href = advisor.url ? safeExternalUrl(advisor.url) : "";
          if (href) {
            return (
              '<a class="course-by-name" href="' +
              escapeAttr(href) +
              '" target="_blank" rel="noopener noreferrer">' +
              escapeHtml(advisor.name) +
              "</a>"
            );
          }
          return '<span class="course-by-name">' + escapeHtml(advisor.name) + "</span>";
        }

        function courseSecondaryMetaMarkup(course) {
          var label = "";
          if (catalogState.group === "block") {
            label = courseFormatLabel(course);
          } else if (catalogState.group === "format") {
            label = courseBlockLabel(course);
          }
          if (!label || label === "Other") {
            return "";
          }
          return '<p class="course-meta">' + escapeHtml(label) + "</p>";
        }

        function courseBylineMarkup(course) {
          var advisors = normalizeCourseAdvisors(course);
          if (advisors.length === 0) {
            return "";
          }
          var label = '<span class="course-by-label">By </span>';
          var html = "";
          for (var i = 0; i < advisors.length; i++) {
            if (i > 0) {
              html += '<span class="course-by-label"> &amp; </span>';
            }
            html += advisorNameMarkup(advisors[i]);
          }
          return '<p class="course-by">' + label + html + "</p>";
        }

        function courseIllustrationTheme(title) {
          var t = String(title || "").toLowerCase();
          if (/organic|reaction|chem|drug/.test(t)) {
            return { from: "#22d3ee", to: "#8b5cf6", accent: "#f0abfc", motif: "chem" };
          }
          if (/bio|membrane|biological/.test(t)) {
            return { from: "#2dd4bf", to: "#2563eb", accent: "#bbf7d0", motif: "bio" };
          }
          if (/database|data engineering|representation/.test(t)) {
            return { from: "#38bdf8", to: "#0f766e", accent: "#fde68a", motif: "data" };
          }
          if (/machine learning|computer vision|using ai|ai research/.test(t)) {
            return { from: "#818cf8", to: "#db2777", accent: "#bfdbfe", motif: "ai" };
          }
          if (/material/.test(t)) {
            return { from: "#f59e0b", to: "#0ea5e9", accent: "#fed7aa", motif: "material" };
          }
          if (/quantum|absolutely small/.test(t)) {
            return { from: "#a78bfa", to: "#0891b2", accent: "#fef3c7", motif: "quantum" };
          }
          if (/mathematical|modeling|simulation/.test(t)) {
            return { from: "#14b8a6", to: "#6366f1", accent: "#ccfbf1", motif: "math" };
          }
          if (/renewable|power/.test(t)) {
            return { from: "#84cc16", to: "#0284c7", accent: "#fef08a", motif: "energy" };
          }
          return { from: "#60a5fa", to: "#8b5cf6", accent: "#e0f2fe", motif: "course" };
        }

        function courseIllustrationSvg(theme) {
          var common =
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">' +
            '<defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="' +
            theme.from +
            '"/><stop offset="1" stop-color="' +
            theme.to +
            '"/></linearGradient></defs>' +
            '<rect width="96" height="96" rx="22" fill="url(#g)"/>' +
            '<circle cx="78" cy="18" r="22" fill="white" opacity=".14"/>' +
            '<circle cx="14" cy="82" r="28" fill="black" opacity=".12"/>';

          if (theme.motif === "chem") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M33 34l15-9 15 9v18l-15 9-15-9z"/><path d="M63 43h12M21 43h12M48 25V13M48 61v13"/></g></svg>'
            );
          }
          if (theme.motif === "bio") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="5" stroke-linecap="round"><path d="M26 31c14-10 30 30 44 20"/><path d="M26 47c14-10 30 30 44 20"/><path d="M34 29l-5 18M45 38l-5 18M56 47l-5 18M67 50l-5 18"/></g></svg>'
            );
          }
          if (theme.motif === "data") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M25 29h46v12H25zM25 43h46v12H25zM25 57h46v12H25z"/><path d="M34 35h1M34 49h1M34 63h1"/></g></svg>'
            );
          }
          if (theme.motif === "ai") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><rect x="30" y="30" width="36" height="36" rx="8"/><path d="M48 22v8M48 66v8M22 48h8M66 48h8M37 43h1M58 43h1M40 56c5 4 11 4 16 0"/></g></svg>'
            );
          }
          if (theme.motif === "material") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M48 19l26 15v30L48 79 22 64V34z"/><path d="M22 34l26 15 26-15M48 49v30"/></g></svg>'
            );
          }
          if (theme.motif === "quantum") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="4" stroke-linecap="round"><circle cx="48" cy="48" r="6" fill="' +
              theme.accent +
              '"/><ellipse cx="48" cy="48" rx="30" ry="12"/><ellipse cx="48" cy="48" rx="30" ry="12" transform="rotate(60 48 48)"/><ellipse cx="48" cy="48" rx="30" ry="12" transform="rotate(120 48 48)"/></g></svg>'
            );
          }
          if (theme.motif === "math") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M24 64c12-33 22-33 34 0M38 49h34M62 30l10 10-10 10"/></g></svg>'
            );
          }
          if (theme.motif === "energy") {
            return (
              common +
              '<g fill="none" stroke="' +
              theme.accent +
              '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M48 16v28M48 44L25 31M48 44l23-13M48 44v36M35 80h26"/></g></svg>'
            );
          }
          return common + '<path d="M28 30h40v36H28zM36 40h24M36 50h18" fill="none" stroke="' + theme.accent + '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        }

        function courseImageMarkup(course) {
          var title = course && course.title ? String(course.title) : "Mini-course";
          var svg = courseIllustrationSvg(courseIllustrationTheme(title));
          var src = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
          return '<img src="' + escapeAttr(src) + '" alt="" loading="lazy" decoding="async" />';
        }

        function ensureSubtitleDom() {
          var subEl = document.getElementById("site-subtitle");
          if (!subEl) {
            return;
          }
          if (subEl.querySelector("#subtitle-prefix")) {
            return;
          }
          subEl.innerHTML =
            '<span id="subtitle-a11y" class="sr-only" aria-live="polite" aria-atomic="true"></span>' +
            '<span id="subtitle-prefix"></span>' +
            '<span id="subtitle-typed" class="subtitle-typed subtitle-typed--cursor" aria-hidden="true"></span>';
          subEl.classList.add("site-subtitle");
        }

        function setSubtitleA11y(text) {
          var live = document.getElementById("subtitle-a11y");
          if (live) {
            live.textContent = text;
          }
        }

        function setupSubtitle(cfg) {
          ensureSubtitleDom();
          clearSubtitleAnimation();
          var runId = subtitleAnimToken;
          var prefixEl = document.getElementById("subtitle-prefix");
          var typedEl = document.getElementById("subtitle-typed");
          if (!prefixEl || !typedEl) {
            return;
          }

          var raw = cfg.subtitleRotateWords;
          var words = Array.isArray(raw) ? raw : [];
          var cleaned = [];
          for (var w = 0; w < words.length; w++) {
            var part = String(words[w] == null ? "" : words[w]).trim();
            if (part) {
              cleaned.push(part);
            }
          }

          var prefix = typeof cfg.subtitlePrefix === "string" ? cfg.subtitlePrefix : "";

          if (cleaned.length === 0) {
            typedEl.textContent = "";
            typedEl.classList.remove("subtitle-typed--cursor");
            prefixEl.textContent = cfg.siteSubtitle != null ? String(cfg.siteSubtitle) : "";
            setSubtitleA11y(prefixEl.textContent.trim());
            return;
          }

          typedEl.classList.add("subtitle-typed--cursor");
          prefixEl.textContent = prefix;

          var reduced = false;
          try {
            reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          } catch (e1) {
            reduced = false;
          }

          if (reduced) {
            typedEl.textContent = cleaned[0];
            setSubtitleA11y((prefix + cleaned[0]).trim());
            return;
          }

          var wordIndex = 0;
          var charIndex = 0;
          var deleting = false;
          var TYPE_MS = 48;
          var DELETE_MS = 34;
          var PAUSE_TYPED = 2200;
          var PAUSE_EMPTY = 400;

          function tick() {
            if (runId !== subtitleAnimToken) {
              return;
            }
            var word = cleaned[wordIndex % cleaned.length];
            if (!deleting) {
              if (charIndex < word.length) {
                charIndex += 1;
                typedEl.textContent = word.slice(0, charIndex);
                if (charIndex === word.length) {
                  setSubtitleA11y((prefix + word).trim());
                }
                scheduleSubtitleStep(runId, TYPE_MS, tick);
              } else {
                scheduleSubtitleStep(runId, PAUSE_TYPED, function () {
                  deleting = true;
                  tick();
                });
              }
            } else if (charIndex > 0) {
              charIndex -= 1;
              typedEl.textContent = word.slice(0, charIndex);
              scheduleSubtitleStep(runId, DELETE_MS, tick);
            } else {
              deleting = false;
              wordIndex += 1;
              scheduleSubtitleStep(runId, PAUSE_EMPTY, tick);
            }
          }

          typedEl.textContent = "";
          tick();
        }

        function normalizeEnrollBase(url) {
          if (!url || typeof url !== "string") return "";
          var t = url.trim().replace(/\/+$/, "");
          return t + "/";
        }

        function buildEnrollUrl(base, code) {
          if (!code || typeof code !== "string") return "";
          var enc = encodeURIComponent(code.trim());
          return base + enc;
        }

        function courseFormatLabel(course) {
          var raw = course && course.format != null ? String(course.format).trim() : "";
          return raw || "Other";
        }

        function courseBlockLabel(course) {
          var raw = course && course.block != null ? String(course.block).trim() : "";
          if (!raw && course && course.session != null) {
            raw = String(course.session).trim();
          }
          return raw || "Other";
        }

        function updateCatalogControls() {
          var controls = document.getElementById("catalog-controls");
          if (!controls) {
            return;
          }
          var buttons = controls.querySelectorAll("[data-group]");
          for (var i = 0; i < buttons.length; i++) {
            var btn = buttons[i];
            var group = btn.getAttribute("data-group");
            var pressed = group === catalogState.group;
            btn.setAttribute("aria-pressed", pressed ? "true" : "false");
          }
        }

        function setupCatalogControls() {
          var controls = document.getElementById("catalog-controls");
          if (!controls || controls.getAttribute("data-ready") === "true") {
            updateCatalogControls();
            return;
          }
          controls.setAttribute("data-ready", "true");
          controls.addEventListener("click", function (event) {
            var target = event.target;
            while (target && target !== controls && !target.getAttribute("data-group")) {
              target = target.parentNode;
            }
            if (!target || target === controls) {
              return;
            }
            var nextGroup = target.getAttribute("data-group");
            if (nextGroup) {
              catalogState.group = nextGroup;
            }
            render();
          });
          updateCatalogControls();
        }

        function courseCardMarkup(course, index, base, arrow) {
          var href = buildEnrollUrl(base, course.code);
          var label = "Join " + course.title + " in Canvas";
          var metaHtml = courseSecondaryMetaMarkup(course);
          var bylineHtml = courseBylineMarkup(course);
          var imageHtml = courseImageMarkup(course);
          return (
            '<article class="course-card" style="--i:' +
            index +
            '">' +
            '<div class="course-card-inner">' +
            '<div class="course-card-head">' +
            '<div class="course-icon" aria-hidden="true">' +
            imageHtml +
            "</div>" +
            '<div class="course-card-title-block">' +
            '<h2 class="course-title">' +
            escapeHtml(course.title) +
            "</h2>" +
            metaHtml +
            bylineHtml +
            "</div>" +
            "</div>" +
            "</div>" +
            '<div class="course-card-foot">' +
            '<a class="btn-join" href="' +
            escapeAttr(href) +
            '" target="_blank" rel="noopener noreferrer" aria-label="' +
            escapeAttr(label) +
            '">Join in Canvas ' +
            arrow +
            "</a>" +
            "</div>" +
            "</article>"
          );
        }

        function courseGridMarkup(courses, base, arrow, startIndex) {
          var html = '<div class="grid">';
          for (var i = 0; i < courses.length; i++) {
            html += courseCardMarkup(courses[i], startIndex + i, base, arrow);
          }
          return html + "</div>";
        }

        function coursesMarkup(courses, base, arrow) {
          var getGroupLabel = catalogState.group === "format" ? courseFormatLabel : courseBlockLabel;
          var groups = [];
          var groupMap = {};
          for (var i = 0; i < courses.length; i++) {
            var label = getGroupLabel(courses[i]);
            if (!groupMap[label]) {
              groupMap[label] = [];
              groups.push(label);
            }
            groupMap[label].push(courses[i]);
          }

          groups.sort(function (a, b) {
            if (a === "Block 1") return -1;
            if (b === "Block 1") return 1;
            if (a === "Block 2") return -1;
            if (b === "Block 2") return 1;
            if (a === "In-Person") return -1;
            if (b === "In-Person") return 1;
            if (a === "Online") return -1;
            if (b === "Online") return 1;
            return a.localeCompare(b, undefined, { sensitivity: "base" });
          });

          var html = "";
          var count = 0;
          for (var g = 0; g < groups.length; g++) {
            var groupName = groups[g];
            var groupCourses = groupMap[groupName];
            html +=
              '<section class="course-group" aria-label="' +
              escapeAttr(groupName) +
              ' courses"><h2 class="course-group-title">' +
              escapeHtml(groupName) +
              "</h2>" +
              courseGridMarkup(groupCourses, base, arrow, count) +
              "</section>";
            count += groupCourses.length;
          }
          return html;
        }

        function validateConfig(cfg) {
          if (!cfg || typeof cfg !== "object") {
            return { ok: false, message: "Configuration is missing. Add site-config.js (copy from site-config.example.js)." };
          }
          if (!cfg.enrollBaseUrl || typeof cfg.enrollBaseUrl !== "string" || !cfg.enrollBaseUrl.trim()) {
            return {
              ok: false,
              message: "Set enrollBaseUrl in site-config.js to your Canvas self-enrollment base URL (see site-config.example.js).",
            };
          }
          if (!Array.isArray(cfg.courses) || cfg.courses.length === 0) {
            return { ok: false, message: "Add at least one course with a title and join code in site-config.js." };
          }
          for (var i = 0; i < cfg.courses.length; i++) {
            var c = cfg.courses[i];
            if (!c || !c.title || !c.code) {
              return { ok: false, message: "Each course needs a title and code (check entry " + (i + 1) + ")." };
            }
          }
          return { ok: true };
        }

        function render() {
          var cfg = window.ASDRP_CANVAS_CONFIG;
          var grid = document.getElementById("course-grid");
          var errEl = document.getElementById("config-error");
          var titleEl = document.getElementById("site-title");
          var subEl = document.getElementById("site-subtitle");
          var controlsEl = document.getElementById("catalog-controls");

          var check = validateConfig(cfg);
          if (!check.ok) {
            clearSubtitleAnimation();
            grid.innerHTML = "";
            errEl.textContent = check.message;
            errEl.hidden = false;
            if (controlsEl) {
              controlsEl.hidden = true;
            }
            subEl.textContent = "Update configuration to show course links.";
            setSubtitleA11y("");
            applyFooter(cfg);
            document.title = "Canvas enrollment · Setup";
            return;
          }

          errEl.hidden = true;
          if (controlsEl) {
            controlsEl.hidden = false;
          }
          titleEl.textContent = cfg.siteTitle || "Canvas course enrollment";
          document.title = cfg.siteTitle || "Canvas course enrollment";
          var arrow =
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';

          var eyebrowEl = document.getElementById("site-eyebrow");
          if (eyebrowEl) {
            var learnMoreText =
              typeof cfg.learnMoreText === "string" && cfg.learnMoreText.trim()
                ? cfg.learnMoreText.trim()
                : "Learn more about Mini-Courses";
            var learnMoreUrl =
              typeof cfg.learnMoreUrl === "string" && cfg.learnMoreUrl.trim()
                ? safeExternalUrl(cfg.learnMoreUrl)
                : "https://sites.google.com/asdrp.org/student-training/mini-courses";
            eyebrowEl.setAttribute("href", learnMoreUrl);
            eyebrowEl.innerHTML = escapeHtml(learnMoreText) + " " + arrow;
          }

          setupSubtitle(cfg);
          applyFooter(cfg);
          setupCatalogControls();

          var base = normalizeEnrollBase(cfg.enrollBaseUrl);
          grid.innerHTML = coursesMarkup(cfg.courses, base, arrow);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", render);
        } else {
          render();
        }
      })();
    </script>
  </body>
</html>
